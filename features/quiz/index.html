<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz - Sweet 16</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Shared CSS -->
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/components.css">

  <!-- Feature CSS -->
  <link rel="stylesheet" href="quiz.css">
</head>
<body>

  <section class="quiz">
    <div class="quiz__header">
      <h2>Who Said It?</h2>
      <p class="subtitle">Guess who said each quote</p>
      <div class="quiz__counter">1 / 10</div>
    </div>

    <div class="quiz__card">
      <p class="quiz__quote"></p>
    </div>

    <div class="quiz__choices">
      <!-- JS populates two choice buttons -->
    </div>

    <div class="quiz__feedback"></div>

    <div class="quiz__complete">
      <h3>Results</h3>
      <div class="quiz__score-big">0 / 10</div>
      <p class="quiz__result-msg"></p>
    </div>
  </section>

  <script type="module">
    import { initQuiz } from './quiz.js';

    initQuiz(() => {
      console.log('Quiz complete!');
    });
  </script>
</body>
</html>
